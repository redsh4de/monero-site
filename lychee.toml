max_concurrency = 16
max_retries = 2
retry_wait_time = 2
timeout = 20

include_fragments = true

cache = true
max_cache_age = "7d"
cache_exclude_status = "429"

accept = ["200..=299", "429"]

exclude_all_private = true

exclude = [
  # Generated build artifacts (always exist if build succeeded)
  "^file://.*/_astro/",
  "^file://.*/open-graph/",

  # Unreachable without a proxy
  "\\.onion",

  # SPAs whose URL fragments are client-side routes, not DOM anchors
  "^https?://matrix\\.to/",
  "^https?://web\\.libera\\.chat/",

  # Sites that bot-block or rate-limit lychee
  "^https?://eprint\\.iacr\\.org/",
  "^https?://(www\\.)?archive\\.org",
  "^https?://web\\.archive\\.org",

  # Social media (auth-walled or aggressive rate-limiting)
  "^https?://(www\\.)?reddit\\.com",
  "^https?://(www\\.)?x\\.com",
  "^https?://(www\\.)?twitter\\.com",
  "^https?://(www\\.)?linkedin\\.com",
  "^https?://(www\\.)?facebook\\.com",
]
